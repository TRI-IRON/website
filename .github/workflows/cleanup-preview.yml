name: Cleanup PR previews

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments for this branch
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: 0fb02bd98a655dc7d81294f60983cb1c
          PROJECT: website
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's|[^a-zA-Z0-9]|-|g')
          echo "Cleaning preview deployments for branch: $SAFE_BRANCH"

          PAGE=1
          DELETED=0
          while :; do
            RESP=$(curl -sSf -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/deployments?env=preview&page=$PAGE&per_page=25")

            COUNT=$(echo "$RESP" | jq '.result | length')
            [ "$COUNT" -eq 0 ] && break

            IDS=$(echo "$RESP" | jq -r --arg b "$SAFE_BRANCH" \
              '.result[] | select((.deployment_trigger.metadata.branch // "") == $b) | .id')

            for ID in $IDS; do
              echo "Deleting $ID"
              curl -sSf -X DELETE \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/deployments/$ID?force=true" > /dev/null
              DELETED=$((DELETED+1))
            done

            [ "$COUNT" -lt 25 ] && break
            PAGE=$((PAGE+1))
          done

          echo "Deleted $DELETED preview deployment(s) for branch $SAFE_BRANCH"
